# Phase B step 1: RoBERTa-large teacher with proper training budget.
#
# Fixes from the initial seed-88 run:
#   - num_epochs: 10 -> 30 (val F1 was still climbing at epoch 10)
#   - early_stopping_threshold: 0.01 -> 0.001 (actual epoch-over-epoch
#     gains are 0.002-0.006; 0.01 caused patience to never reset)
#   - fp16: True (free ~2x speedup, no quality loss on CUDA)
#   - 3 seeds for proper mean±std reporting
#
# Expected wall-clock: ~4-6 hours on a single GPU for all 3 seeds.
# Expected entity F1: 0.86-0.88 (up from 0.8471 on one undertrained seed).
# Historical vanilla RoBERTa-large baseline.

model_name: roberta-large
seeds: [88, 5768, 78516]
learning_rate: 1.0e-5
batch_size: 8
num_epochs: 30
weight_decay: 0.01
early_stopping_patience: 7
early_stopping_threshold: 1.0e-3
max_seq_length: 256
fp16: true
warmup_ratio: 0.0
lr_scheduler_type: linear
label_smoothing_factor: 0.0

wandb_project: finer-ord
wandb_tags: [teacher, phase-b, roberta-large, vanilla]
output_dir: ./results
