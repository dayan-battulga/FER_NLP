# Phase C step 2: DistilRoBERTa-base with knowledge distillation from teacher.
#
# THE HEADLINE EXPERIMENT. Compared to Phase C step 1, isolates the
# contribution of the teacher signal. Compared to the teacher, shows the
# efficiency gain.
#
# Before running: update teacher_checkpoint_path to the best seed's dir
# from Phase B. This is why Phase B must be done first.
#
# Distillation loss: alpha * CE(student, hard_labels) +
#                   (1-alpha) * T^2 * KL(student_logits/T, teacher_logits/T)
#
# Expected wall-clock: ~2.5 hours for 3 seeds (teacher forward pass adds overhead).
# Expected entity F1: ~0.84-0.86 (recovers 50-80% of student-teacher gap).

model_name: distilroberta-base
seeds: [88, 5768, 78516]
learning_rate: 1.0e-5
batch_size: 8
num_epochs: 30
weight_decay: 0.01
early_stopping_patience: 7
early_stopping_threshold: 1.0e-3
max_seq_length: 256
fp16: true
warmup_ratio: 0.0
lr_scheduler_type: linear
label_smoothing_factor: 0.0

# Distillation-specific
use_distillation: true
teacher_checkpoint_path: ./results/roberta-large_seed88/checkpoint-best  # UPDATE after Phase B
distillation_temperature: 2.0
distillation_alpha: 0.5  # weight on hard-label CE vs soft-label KL

wandb_project: finer-ord
wandb_tags: [student, phase-c, distilroberta, distilled, headline]
output_dir: ./results
