# Phase 5b: 5-epoch CRF fine-tune on top of the DAPT v2 encoder.
#
# Cloned verbatim from `configs/baseline/efficient_after_dapt.yaml` with one
# change: `model_name` points at the DAPT v2 checkpoint instead of the v1
# checkpoint. Everything else is held fixed so any F1 delta vs
# `efficient_after_dapt` (mean 0.8548) is attributable to the corpus-size
# lift (FNSPID + FiNER train) and not recipe drift.
#
# Prerequisite: run
#   python -m src.dapt --config configs/baseline/dapt_roberta_large_v2.yaml
# first. The DAPT v2 script writes the encoder to:
#   ./results/dapt_roberta-large_v2/checkpoint-final/
# which is the path used below.
#
# Wall-clock budget: ~7 min per seed on A100, ~21 min total for 3 seeds.
#
# Acceptance gate (Phase 5b):
#   - 3-seed mean test entity F1 >= 0.86 by itself, OR
#   - Phase 5e ensemble F1 >= 0.875.
# If neither, fall back to v1 + multi-recipe ensemble inside the Phase 5
# time-box.

model_name: ./results/dapt_roberta-large_v2/checkpoint-final
seeds: [88, 5768, 78516]
learning_rate: 3.0e-5
batch_size: 8
num_epochs: 5
weight_decay: 0.01
early_stopping_patience: 7
early_stopping_threshold: 1.0e-3
max_seq_length: 256
fp16: true
warmup_ratio: 0.1
lr_scheduler_type: cosine
label_smoothing_factor: 0.0

use_crf: true
crf_learning_rate: 1.0e-4

wandb_project: finer-ord
wandb_tags: [phase-5, efficient-after-dapt-v2, 5-epoch, crf, roberta-large]
output_dir: ./results
