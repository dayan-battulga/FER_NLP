# Phase 5a step A: DAPT v2 on a multi-source corpus (FNSPID + FiNER train).
#
# Goal: enlarge the DAPT corpus from ~92k FiNER train tokens to roughly the
# 20M-80M token range by streaming a 100k-row FNSPID subsample. Token count
# is logged, not targeted; the FNSPID subsample size is the only input knob.
#
# Critical correctness rules enforced by src/dapt.py + src/dapt_corpus.py:
#   - URL-hash AND content-hash dedup applied to every FNSPID/cc_news row.
#   - No FNSPID/cc_news row whose body content-hash matches a FiNER val/test
#     article passes the leak filter.
#   - 5 FiNER train articles (deterministic by SHA-256(doc_idx)) are reserved
#     as a held-out MLM perplexity probe, excluded from this DAPT corpus.
#   - The saved encoder is loadable by AutoModelForTokenClassification and
#     by the repo's CRF wrapper.
#
# Wall-clock budget on Colab A100: ~10-20 min for streaming + tokenization,
# ~3-5 hours for 1 epoch of MLM at batch 8 / 512 / fp16. The decision gate
# after epoch 1 is: continue to epoch 2 only if `held_out_finer_ppl` is
# still descending faster than 1% per epoch.
#
# Acceptance gate (Phase 5a):
#   - `held_out_finer_ppl` after DAPT v2 is at least 5% lower than the base
#     roberta-large checkpoint's ppl on the same probe.
#   - Final acceptance is downstream Phase 5b mean test entity F1 vs v1's
#     0.8548. If ppl improves but F1 does not, the corpus lift did not
#     transfer; document and proceed to multi-recipe ensemble as the
#     headline lever.

model_name: roberta-large
output_dir: ./results

learning_rate: 1.0e-5
num_train_epochs: 1
batch_size: 8
max_seq_length: 512
weight_decay: 0.01
warmup_ratio: 0.06
lr_scheduler_type: linear
mlm_probability: 0.15
fp16: true
seed: 88
save_total_limit: 1
logging_steps: 100

# Phase 5a corpus knobs.
corpus_source: fnspid_plus_finer
include_cc_news: false
fnspid_subsample: 100000
held_out_probe_size: 5

wandb_project: finer-ord
wandb_tags: [phase-5, dapt-v2, roberta-large, mlm, fnspid]
