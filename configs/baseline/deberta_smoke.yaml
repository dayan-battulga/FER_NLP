# DeBERTa-v3-large smoke test before full multi-seed runs.
#
# Uses one seed and one epoch only to validate end-to-end data/model/trainer
# wiring and artifact generation.

model_name: microsoft/deberta-v3-large
seeds: [88]
learning_rate: 5.0e-5
head_lr: 5.0e-5
llrd_decay: 0.9
batch_size: 8
num_epochs: 1
weight_decay: 0.01
early_stopping_patience: 7
early_stopping_threshold: 1.0e-3
max_seq_length: 256
fp16: true
warmup_ratio: 0.1
lr_scheduler_type: cosine
label_smoothing_factor: 0.0
label_all_subwords: true
use_crf: false
use_distillation: false

wandb_project: finer-ord
wandb_tags: [phase-d, smoke, deberta-v3-large]
output_dir: results/deberta_smoke_seed88/
