# Phase D optional: Match teacher quality in 5 epochs via efficient training.
#
# This directly addresses Daniel's "0.9 F1 in 5 epochs" framing.
# Tests whether cosine schedule + warmup + higher peak LR converges faster
# than the paper's flat 1e-5 x 10 epochs recipe.
#
# If this hits >= the vanilla teacher's entity F1 in 5 epochs, it's a
# strong "efficiency" headline for the report.
#
# Expected wall-clock: ~40 min for 3 seeds (5 epochs vs 30).
# Expected entity F1: 0.85-0.87 if the schedule works as predicted.

model_name: roberta-large
seeds: [88, 5768, 78516]
learning_rate: 3.0e-5         # peak LR, higher than baseline
batch_size: 8
num_epochs: 5                 # constrained to match the comparison
weight_decay: 0.01
early_stopping_patience: 7
early_stopping_threshold: 1.0e-3
max_seq_length: 256
fp16: true
warmup_ratio: 0.1             # 10% of steps for warmup
lr_scheduler_type: cosine     # decay from peak
label_smoothing_factor: 0.0

wandb_project: finer-ord
wandb_tags: [phase-d, ablation, efficient-training, 5-epoch]
output_dir: ./results
