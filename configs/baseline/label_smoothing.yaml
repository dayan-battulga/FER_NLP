# Phase D optional: Label smoothing on the distilled student.
#
# Label smoothing pushes the model off overconfident predictions on the
# O-majority class, which can improve calibration on imbalanced token
# classification.
#
# Run on the distilled student — that's the model that would ship, so
# that's where regularization matters most.
#
# Expected wall-clock: ~2.5 hours for 3 seeds.
# Expected delta: +0.2 to +0.8 entity F1 over the distilled baseline, or
# no change (in which case: drop it).

model_name: distilroberta-base
seeds: [88, 5768, 78516]
learning_rate: 1.0e-5
batch_size: 8
num_epochs: 30
weight_decay: 0.01
early_stopping_patience: 7
early_stopping_threshold: 1.0e-3
max_seq_length: 256
fp16: true
warmup_ratio: 0.0
lr_scheduler_type: linear
label_smoothing_factor: 0.05   # the only change

# Distillation (same as phase_c_student_distilled)
use_distillation: true
teacher_checkpoint_path: ./results/roberta-large_seed88/checkpoint-best
distillation_temperature: 2.0
distillation_alpha: 0.5

wandb_project: finer-ord
wandb_tags: [phase-d, ablation, regularization, label-smoothing]
output_dir: ./results
